name: Tag & Bump

# Manually-triggered: tags the current VERSION, then patch-bumps VERSION on main
# so the next commit moves forward. The tag push is what fires release.yml —
# which is why a PAT is required (GITHUB_TOKEN-authored pushes don't trigger
# other workflows).

on:
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  tag-and-bump:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag current version
        run: |
          CURRENT=$(tr -d '[:space:]' < VERSION)
          if git rev-parse "v${CURRENT}" >/dev/null 2>&1; then
            echo "Tag v${CURRENT} already exists — aborting. Bump VERSION on main first."
            exit 1
          fi
          git tag "v${CURRENT}"
          echo "TAGGED_VERSION=${CURRENT}" >> "$GITHUB_ENV"

      - name: Bump patch version
        run: |
          CURRENT=$(tr -d '[:space:]' < VERSION)
          NEXT=$(awk -F. '{printf "%d.%d.%d", $1, $2, $3 + 1}' VERSION)
          printf "%s\n" "$NEXT" > VERSION
          echo "NEXT_VERSION=${NEXT}" >> "$GITHUB_ENV"

      - name: Sync README install snippet to tagged version
        run: |
          sed -i -E \
            "s|(swift-notes-automation\.git\", from: )\"[0-9]+\.[0-9]+\.[0-9]+\"|\\1\"${TAGGED_VERSION}\"|" \
            README.md

      - name: Commit and push
        run: |
          git add VERSION README.md
          git commit -m "chore: bump version to v${NEXT_VERSION}"
          git push origin main
          git push origin "v${TAGGED_VERSION}"
