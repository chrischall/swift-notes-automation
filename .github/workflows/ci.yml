name: CI
on:
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
